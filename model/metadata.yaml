# Definition of metadata for equipment. Please do not add ccmm model here,
# add the ccmm_preset instead.

Metadata:
  properties:
    # TODO
    # UMITE NEKDO ZAPNOUT CCMMko? Mne to takto neslo:
#   ccmm_baseline:
#     type: ccmm_preset
    # TODO tohle jsem podedil z prikladu, nevim jestli to tam musi byt
    # (pravdepodobne CCMMko nahradi)
    title:
      type: fulltext+keyword
# ------------------------------
# Model pro tzv. RAW records
# ------------------------------
    specimen:
      type: CZBISpecimen
      required: true
    sample_prep:
      type: array
      items:
        type: CZBIActivitySamplePreparation
      # i kdyby to pole melo byt prazdne, necht je tam vzdy explicitne uvedeno
      required: true
    scopes:
      type: CZBIActivityImageAcquisition
      required: true
# ------------------------------
    # TODO tohle jsem podedil z prikladu, nevim jestli to tam musi byt
    # (pravdepodobne CCMMko nahradi)
    languages:
      type: array
      items:
        type: vocabulary
        vocabulary-type: languages

# Hints for Vlado:
# keyword: exact-match, not broken into tokens, "as-is"
#    Perfect for IDs, status values, categories, tags, and structured data where you need precise matching
#
# fulltext: into tokens, supports synonyms, relevance scoring -- full-text search
#    Ideal for descriptions, abstracts... search within the content rather than match exactly
#
# fulltext+keyword: does both above
#    Perfect for titles, names, and other text that needs both search functionality and precise filtering/faceting


# Trida reprezentuje jeden fyzicky vzorek (jednu instanci), ktery se posleze
# snimal a ktery je tedy zobrazen v deponovanych "raw" datech. Vedec mohl mit
# vice instanci stejne popsanych vzorku. Napriklad, vedec posbiral 4 vzorky
# bunek tlusteho streva, kazdy vzorek nasnimal samostatne a kazdy je deponovan
# samostatne; tzn. jeden vzorek = jeden Invenio record. Nicmene, v tomto
# priklade jsou vsechny 4 vzorky popsany stejne, pouziji se stejne hodnoty
# v atributech teto tridy az na 'specimen_name', pomoci ktereho si vedec
# rozlisuje mezi temi 4mi vzorkami.
CZBISpecimen:
  type: nested
  properties:
    specimen_name:
      # Pojmenovani ci oznaceni fyzickeho vzorku, ktery se nachysta pro
      # experiment a pro snimani; to chystani se deje v a je popsano
      # pomoci nasledujicich CZBIActivitySamplePreparation objektu.
      #
      # Hodnota neni obsahove nejak omezena, neni od nikud vybirana.
      type: fulltext+keyword
      label: Specimen label
      required: true
    specimen_is:
      # Specimen (vzorek) je vzdy typove nejaka biologicka entita,
      # napr. Kostni dren, Hepa bunka, Jatro z byka nekuraka :)
      #
      # Hodnota bude z ontologie/slovniku.
      #
      # Hrozi, ze casem bude nejprve vyber slovniku a hodnota potom bude
      # z vybraneho slovniku (nyni ale v modelu neni atribut na ulozeni
      # zvoleneho slovniku, ze ktereho hodnota prisla).
      type: keyword
      label: Biological entity
      hint: Single-choice Dropbox ze seznamu od Vlada (TBA)
      required: true
    specimen_part_of:
      # Nekdy 'specimen_is' neposkytuje dostatecne urceni, napriklad
      # 'Embryonic Stem Cell' nestaci, musi se rict z jakeho druhu embrya;
      # to se prave doplnuje tady.
      #
      # Hodnoty se budou nabirat uplne stejne jako pro 'specimen_is'.
      type: array
      items:
        type: keyword
        label: Additional biological entity
        hint: Single-choice Dropbox ze seznamu od Vlada (TBA)
    taxon:
      # Specimen je sice biologicka entita, ale ta je bud synteticka/umela
      # (coz je nyni z modelu vynechano) nebo pochazi z nejakeho existujiciho
      # druhu - zivocicha ci rostliny; taxon urcuje jaky druh zivocicha ci
      # rostliny to je.
      #
      # Hodnota bude z jedine ontologie/slovniku.
      type: keyword
      label: Taxon of the entity
      hint: Single-choice Dropbox ze seznamu od Vlada (TBA)
      required: true
    additional_info:
      # Nekdy to jeste nestaci na dopresneni specimenu (vzorku), napriklad
      # chceme umoznit vedcum dopsat, ze treba ta Hepa bunka byla sesbirana
      # ze samcich embrii ve veku 100-140 hpf a navic tech, ktere se narodili
      # tak ci onak -- na tyhle detaily (defacto uz vlastne parametry experimentu)
      # proste nejsou ontologie, ani se to neda postihnout nejakou beznou entitou.
      #
      # Hodnota neni obsahove nejak omezena, neni od nikud vybirana.
      type: fulltext
      label: Furher description
      hint: The place for additional experimental settings


# Trida reprezentuje cinnost, kterou vedec "provedl vzorku" jeste predtim
# nez vzorek zalozil a nasnimal mikroskopem. Je to "pojitko/pribeh" mezi
# "inicialnim obstaranym vzorkem" (popsanym v 'CZBISpecimen') a jeho
# "digitalizaci" (popsane v 'CZBIActivityImageAcquisition'), a ma to vliv
# na pochopeni co presne je potom v depovanych obrazech zobrazeno. Tento
# "pribeh" nemusi existovat (napriklad "specimen je smitko prachu z parapetu,
# ktere jsem rovnou vlozil do mikroskopu"; cili neprobehla zadna priprava
# vzorku), nebo se naopak muze skladat z mnoha dilcich pribehu (posloupnost
# 'CZBIActivitySamplePreparation'). Granularita popisu pribehu a pocet dilcich
# pribehu neni zamerne definovano, je to ponechano na vedcove odhadu.
CZBIActivitySamplePreparation:
  type: nested
  properties:
    protocol_type:
      # Obecny typ/charakter relevantni prace se vzorkem, jako napriklad
      # dodatecna biologicka/chemicka manipulace (napr. barveni, vymyvani
      # barev, odstredovani, zahrivani, smichavani s cinidly atp.) nebo
      # fyzikalni (orezavani, fixace atp.). Trochu si prejeme, aby diky
      # teto kategorizaci cinnosti byl vedec nucen se rozepsat pres vice
      # "dilcich pribehu". Muze potom snadno tyto "bloby" recyklovat pri
      # vytvareni sister-recordu: Predstavme si kontrolni a experimentalni
      # datovou sadu -- tyto vznikaji do znacne miry spolecne ze stejneho
      # typu specimenu, ale s vyjimkou nejakeho "disturbance" specialniho
      # kroku v priprave u experimentalni sady.
      #
      # Hodnota bude z ontologie/slovniku.
      #
      # Hrozi, ze casem bude nejprve vyber slovniku a hodnota potom bude
      # z vybraneho slovniku (nyni ale v modelu neni atribut na ulozeni
      # zvoleneho slovniku, ze ktereho hodnota prisla).
      type: keyword
      label: Protocol type
      hint: Single-choice Dropbox ze seznamu od Vlada (TBA)
      required: true
    description:
      # Precizni a reproducibilni popis relevantni prace se vzorkem, jako
      # napriklad popis dodatecne biologicke ci chemicke manipulace (napr.
      # barveni, vymyvani barev, odstredovani, zahrivani, smichavani s cinidly
      # atp.) nebo fyzikalni (orezavani, fixace atp.). Dobrym prikladem jsou
      # sekce "Materials and Methods" z clanku.
      #
      # Hodnota neni obsahove nejak omezena, neni od nikud vybirana
      # a popis bude spise dlouhy, klidne i maly pocet stran textu
      # (pokud se vedec rozhodne delat velkou granularitu).
      type: fulltext
      label: Protocol details
      hint: The place for main detailed description
      required: true
    additional_info:
      # Pokud se vedec rozhodne, a my bychom to tak radi videli, znovu-pouzivat
      # sve "bloby" z 'description', ma zde moznost uvest pripadne mirne odchylky.
      # Da se to chapat i tak, ze celkovy popis tohoto "pribehu" je logicky
      # rozlozeny pres dva useky, tzn. pres 'description' + 'additional_info',
      # kde 'description' je urcity spolecny, re-usable blob popisu.
      #
      # Hodnota neni obsahove nejak omezena, neni od nikud vybirana
      # a popis bude spise dlouhy, klidne i maly pocet stran textu
      # (pokud se vedec rozhodne delat velkou granularitu).
      type: fulltext
      label: Furher description
      hint: The place for additional specific description


# Trida popisuje instrument, kterym se fyzicky vzorek zobrazil
# do pocitace. Typicky byl vlozen do mikroskopu a vyfocen.
CZBIActivityImageAcquisition:
  type: nested
  properties:
    imaging_type:
      # ('imaging_type' je "metoda aktivity")
      #
      # Popis druhu mikroskopie, napriklad LSCM, TRIF, FLIM, FRAP, atd.
      # Popis bude typicky ve formatu Laser-scanning Confocal Microscopy (LSCM),
      # tzn. rozvinuty slovnik popis a jeho bezne znama zkratka.
      #
      # Hodnota bude z jedine ontologie/slovniku.
      type: keyword
      label: Microscopy technique
      hint: Single-choice Dropbox ze seznamu od Vlada (TBA)
      required: true
    instrument:
      # ('instrument' je "tool aktivity")
      #
      # V CzBI se planuje vytvorit ciselnik vsech mikroskopu, ktere se
      # pouzivaji... proste List< PairOf<int,string> >, kde je (v ramci
      # toho ciselniku) jedinecne ID a potom pomerne dlouhy (10+ slov)
      # popis toho konkretniho pristroje. Predstavoval bych si casem
      # vkladat do Invenia neco jako f"({id}) {string}", tzn. ulozit
      # ID stroje a jeho soudoby popis.
      #
      # Hodnota bude z jedine ontologie/slovniku.
      type: fulltext+keyword
      label: Instrument used
      hint: Cut-and-paste here from the external list of all available instruments
      required: true
    additional_info:
      # Pristroj muze byt pro dane snimani specificky nastaven. Takoveto
      # nastaveni je vlastne odchylka od popisu pristroje v 'instrument',
      # a je treba to zde zadokumentovat (pri vyhledavani se to ale bude
      # bit...). Plati tez: Takoveto nastaveni je vlastne doplneni popisu
      # pristroje z 'instrument' (to sice nebude delat rozpory uvnitr recordu,
      # ale i tak jsou zase/porad dve polozky pres ktere je nutno vyhledavat
      # pokud se budou hledat data nasnimana napr. konkretnim typem objektivu
      # nebo vlnovou delkou laseru). Bude zalezet jak detailne vedci nadefinuji
      # sve pristroje pro 'instrument'.
      #
      # Hodnota neni obsahove nejak omezena, neni od nikud vybirana.
      type: fulltext+keyword
      label: Additional instrument setting
      hint: List here all non-standard settings of the instrument

